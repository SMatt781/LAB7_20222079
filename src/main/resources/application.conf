pekko {
  # Registrar con logging (Slf4jLogger requiere pekko-slf4j en el classpath)
  loglevel = "INFO"
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

  actor {
    # CRÍTICO: usar "cluster" para habilitar Pekko Cluster
    provider = "cluster"

    serialization-bindings {
      "com.example.sdn.NetworkEvent" = jackson-json
    }
  }

  remote.artery {
    # Para el controlador: HOSTNAME=controller
    # Para switch-1: HOSTNAME=switch-1
    # Para switch-2: HOSTNAME=switch-2
    canonical.hostname = ${?HOSTNAME}
    canonical.port = 2551

    # Timeout para conexiones remotas
    advanced.handshake-timeout = 15s
  }

  cluster {
    # seed-nodes: dónde conectar para unirse al cluster
    # El controlador es el seed node (siempre está primero)
    seed-nodes = ["pekko://SDNSystem@controller:2551"]

    # Bajar timeouts para que se detecten desconexiones más rápido
    down-removal-margin = 5s
  }
}
